<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 14px;
            font-size: 13px;
        }
        h1 {
            font-size: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #89b4fa;
        }
        .master-toggle {
            background: linear-gradient(135deg, #1a1a3e, #16213e);
            border: 1.5px solid #89b4fa;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .master-toggle.disabled {
            border-color: #45475a;
            background: #313244;
        }
        .master-label { font-size: 14px; font-weight: 600; color: #cdd6f4; }
        .master-hint { font-size: 11px; color: #6c7086; margin-top: 2px; }
        #main-content.disabled {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.3);
            transition: all 0.3s ease;
        }
        #main-content { transition: all 0.3s ease; }
        .status-card {
            background: #313244;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .status-left { display: flex; flex-direction: column; gap: 3px; }
        .status-row { display: flex; align-items: center; gap: 7px; font-size: 13px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .dot-green { background: #a6e3a1; box-shadow: 0 0 5px #a6e3a1; }
        .dot-red   { background: #f38ba8; box-shadow: 0 0 5px #f38ba8; }
        .workspace-path {
            font-size: 11px; color: #6c7086; font-family: monospace;
            word-break: break-all; max-width: 260px;
        }
        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #313244; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
        }
        .toggle-label { font-size: 13px; color: #cdd6f4; }
        .toggle-hint  { font-size: 11px; color: #6c7086; margin-top: 2px; }
        .toggle-switch { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
        .toggle-switch input { display: none; }
        .toggle-slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #45475a; border-radius: 22px; cursor: pointer; transition: background 0.2s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; width: 16px; height: 16px;
            left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #89b4fa; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
        .section-title {
            font-size: 11px; color: #6c7086; text-transform: uppercase;
            letter-spacing: 0.8px; margin-bottom: 6px;
        }
        .action-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 6px; margin-bottom: 10px;
        }
        .action-btn {
            padding: 8px 6px; border: none; border-radius: 6px;
            background: #313244; color: #cdd6f4; font-size: 12px;
            cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.4;
        }
        .action-btn:hover { background: #45475a; }
        .action-btn.danger:hover { background: #3a1a1a; color: #f38ba8; }
        .path-section {
            background: #313244; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
        }
        .path-input-row { display: flex; gap: 6px; margin-top: 6px; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 7px 9px; border: 1px solid #45475a; border-radius: 6px;
            background: #1e1e2e; color: #cdd6f4; font-size: 12px; outline: none;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus { border-color: #89b4fa; }
        .btn-small {
            padding: 7px 12px; border: none; border-radius: 6px;
            background: #89b4fa; color: #1e1e2e; font-size: 12px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .btn-small:hover { background: #74c7ec; }
        .project-list {
            margin-top: 8px; display: flex; flex-direction: column; gap: 4px;
            max-height: 100px; overflow-y: auto;
        }
        .project-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 8px; background: #1e1e2e; border-radius: 5px;
            font-size: 11px; cursor: pointer; border: 1px solid transparent;
        }
        .project-item:hover { border-color: #45475a; }
        .project-item.active { border-color: #89b4fa; color: #89b4fa; }
        .project-item-name { font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-item-del { color: #6c7086; cursor: pointer; padding: 0 4px; font-size: 14px; flex-shrink: 0; }
        .project-item-del:hover { color: #f38ba8; }
        .manual-section {
            background: #313244; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
        }
        textarea {
            height: 90px; resize: vertical;
            font-family: "Cascadia Code", "Fira Code", monospace; font-size: 11px;
        }
        .btn-primary {
            display: block; width: 100%; padding: 9px; margin-top: 7px;
            border: none; border-radius: 6px; background: #89b4fa; color: #1e1e2e;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .btn-primary:hover { background: #74c7ec; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .port-section {
            display: flex; gap: 6px; align-items: center; margin-bottom: 10px;
        }
        .port-section label { font-size: 12px; color: #6c7086; white-space: nowrap; }
        .port-section input { width: 80px; flex-shrink: 0; }
        .result {
            padding: 8px 10px; border-radius: 6px; font-size: 12px;
            display: none; margin-top: 6px;
        }
        .result-success { background: #1a3a1a; color: #a6e3a1; border: 1px solid #2e7d32; display: block; }
        .result-error   { background: #3a1a1a; color: #f38ba8; border: 1px solid #d32f2f; display: block; }

        /* 提示词卡片 */
        .prompt-card {
            background: linear-gradient(135deg, #1a3a2a, #16213e);
            border: 1px solid #2e7d32;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .prompt-card .section-title { color: #a6e3a1; }
        .prompt-card p {
            font-size: 11px; color: #6c7086; margin: 4px 0 8px 0; line-height: 1.5;
        }
        .btn-copy-prompt {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 9px; border: none; border-radius: 6px;
            background: #a6e3a1; color: #1e1e2e; font-size: 13px;
            font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .btn-copy-prompt:hover { background: #74dba0; }
        .btn-copy-prompt.copied {
            background: #2e7d32; color: #a6e3a1;
        }
    </style>
</head>
<body>
    <h1>⚡ AI Code Agent</h1>

    <!-- 插件总开关 -->
    <div class="master-toggle" id="master-toggle-card">
        <div>
            <div class="master-label">🔌 插件总开关</div>
            <div class="master-hint" id="master-hint">插件已启用，正在监控页面</div>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="extension-enabled-toggle" checked />
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div id="main-content">

        <!-- 🟢 新增：一键复制提示词 -->
        <div class="prompt-card">
            <div class="section-title">🚀 快速开始</div>
            <p>第一次和 AI 对话时，先发送这段提示词，AI 就会按照插件能识别的格式回复代码。</p>
            <button class="btn-copy-prompt" id="btn-copy-prompt">📋 一键复制 AI 提示词</button>
        </div>

        <!-- 连接状态 -->
        <div class="status-card">
            <div class="status-left">
                <div class="status-row">
                    <span id="status-dot" class="dot dot-red"></span>
                    <span id="status-label">检查连接中...</span>
                </div>
                <div id="workspace-info" class="workspace-path"></div>
            </div>
            <button class="btn-small" id="refresh-btn" style="height:32px">🔄 刷新</button>
        </div>

        <!-- 自动跳转 -->
        <div class="toggle-row">
            <div>
                <div class="toggle-label">🚀 点击后自动跳转到 VS Code</div>
                <div class="toggle-hint">发送代码后自动切换窗口到 VS Code</div>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="auto-jump-toggle" checked />
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- 自动检测 -->
        <div class="toggle-row">
            <div>
                <div class="toggle-label">🔍 自动检测页面代码块</div>
                <div class="toggle-hint">在 AI 回答旁自动显示「应用」按钮</div>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="auto-scan-toggle" checked />
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- 快捷操作 -->
        <div class="section-title">快捷操作</div>
        <div class="action-grid">
            <button class="action-btn" id="btn-scan">🔍 立即扫描当前页面</button>
            <button class="action-btn" id="btn-restart">🔄 重启 VS Code 服务器</button>
            <button class="action-btn danger" id="btn-undo">⏪ 撤销上次 AI 修改</button>
            <button class="action-btn" id="btn-open-log">📜 查看操作日志</button>
        </div>

        <!-- 项目路径 -->
        <div class="path-section">
            <div class="section-title">📁 项目路径管理</div>
            <div class="path-input-row">
                <input type="text" id="path-input" placeholder="D:\\桌面\\my-project 或 /home/user/project" />
                <button class="btn-small" id="add-path-btn">添加</button>
            </div>
            <div id="project-list" class="project-list"></div>
            <div style="font-size:11px;color:#6c7086;margin-top:6px;">蓝色高亮 = VS Code 当前打开的工作区</div>
        </div>

        <!-- 端口 -->
        <div class="port-section">
            <label>服务器端口：</label>
            <input type="number" id="port-input" value="9960" min="1024" max="65535" />
            <button class="btn-small" id="save-port-btn">保存</button>
        </div>

        <!-- 手动粘贴 -->
        <div class="manual-section">
            <div class="section-title">手动粘贴 AI 回复</div>
            <textarea id="manual-text" placeholder="粘贴包含 agent-action 代码块的 AI 回复文本..."></textarea>
            <button class="btn-primary" id="manual-send-btn">📤 发送到 VS Code</button>
        </div>

    </div>

    <div id="result" class="result"></div>
    <script src="popup.js"></script>
</body>
</html>
