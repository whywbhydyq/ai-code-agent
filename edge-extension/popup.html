<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 400px; max-height: 600px; overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1e1e2e; color: #cdd6f4; font-size: 13px; padding: 12px;
        }
        h1 { font-size: 15px; color: #89b4fa; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .card { background: #313244; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
        .card-title { font-size: 11px; color: #6c7086; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-green { background: #a6e3a1; box-shadow: 0 0 4px #a6e3a1; }
        .dot-red   { background: #f38ba8; box-shadow: 0 0 4px #f38ba8; }
        .status-row { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 4px; }
        .workspace-name { font-family: monospace; color: #89b4fa; font-size: 12px; }
        .ws-chip {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            border: 1px solid #45475a; background: #1e1e2e; color: #cdd6f4;
            font-size: 11px; font-family: monospace; cursor: pointer; transition: all 0.15s; margin: 2px;
        }
        .ws-chip:hover { border-color: #89b4fa; }
        .ws-chip.active { border-color: #89b4fa; background: rgba(137,180,250,0.15); color: #89b4fa; }
        .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .btn {
            flex: 1; padding: 8px 6px; border: none; border-radius: 6px;
            background: #45475a; color: #cdd6f4; font-size: 11px;
            cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .btn:hover { background: #585b70; }
        .btn.primary { background: #89b4fa; color: #1e1e2e; font-weight: 600; }
        .btn.primary:hover { background: #74c7ec; }
        .btn.green { background: #a6e3a1; color: #1e1e2e; font-weight: 600; }
        .btn.green:hover { background: #74dba0; }
        .btn.danger:hover { background: #45273a; color: #f38ba8; }
        .btn.warn { background: #fab387; color: #1e1e2e; font-weight: 600; }
        .btn.warn:hover { background: #f9c87c; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
        .toggle-label { font-size: 12px; }
        .toggle-switch { position: relative; width: 36px; height: 18px; flex-shrink: 0; }
        .toggle-switch input { display: none; }
        .toggle-slider {
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: #45475a; border-radius: 18px; cursor: pointer; transition: 0.2s;
        }
        .toggle-slider::before {
            content:''; position: absolute; width: 14px; height: 14px;
            left: 2px; top: 2px; background: white; border-radius: 50%; transition: 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #89b4fa; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }
        input[type="text"], textarea {
            width: 100%; padding: 6px 8px; border: 1px solid #45475a; border-radius: 6px;
            background: #1e1e2e; color: #cdd6f4; font-size: 12px; outline: none;
        }
        input:focus, textarea:focus { border-color: #89b4fa; }
        textarea { height: 80px; resize: vertical; font-family: monospace; font-size: 11px; }
        .recent-item { display: flex; align-items: center; gap: 5px; padding: 3px 0; font-size: 11px; }
        .recent-file { flex:1; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .recent-time { color: #6c7086; font-size: 10px; flex-shrink: 0; }
        .path-item {
            display: flex; align-items: center; gap: 4px; padding: 3px 6px;
            background: #1e1e2e; border-radius: 4px; font-size: 11px; margin-top: 3px;
        }
        .path-name { flex:1; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .path-name:hover { color: #89b4fa; }
        .path-del { color: #6c7086; cursor: pointer; font-size: 13px; }
        .path-del:hover { color: #f38ba8; }
        .path-badge { font-size: 9px; color: #a6e3a1; background: rgba(166,227,161,0.1); padding: 1px 5px; border-radius: 8px; }
        .result {
            position: sticky; top: 0; z-index: 1000;
            padding: 8px 12px; border-radius: 6px; font-size: 12px;
            display: none; margin-bottom: 8px;
            animation: resultSlide 0.3s ease;
        }
        .result-success { background: #1a3a1a; color: #a6e3a1; border: 1px solid #2e7d32; display: block; }
        .result-error   { background: #3a1a1a; color: #f38ba8; border: 1px solid #d32f2f; display: block; }
        @keyframes resultSlide { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .collapse-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; cursor: pointer; user-select: none; }
        .collapse-header:hover .collapse-title { color: #89b4fa; }
        .collapse-title { font-size: 12px; color: #6c7086; }
        .collapse-arrow { color: #6c7086; font-size: 10px; transition: transform 0.2s; }
        .collapse-arrow.open { transform: rotate(90deg); }
        .collapse-body { display: none; }
        .collapse-body.open { display: block; }
        .btn-small { padding: 5px 10px; border: none; border-radius: 6px; background: #89b4fa; color: #1e1e2e; font-size: 11px; font-weight: 600; cursor: pointer; }
        .btn-small:hover { background: #74c7ec; }
        .divider { height: 1px; background: #313244; margin: 8px 0; }
    </style>
</head>
<body>
    <h1>&#x26A1; AI Code Agent</h1>

    <!-- 浮动结果通知 sticky 顶部 -->
    <div id="result" class="result"></div>

    <!-- 连接状态 -->
    <div class="card">
        <div class="status-row">
            <span id="status-dot" class="dot dot-red"></span>
            <span id="status-label">检查连接中...</span>
            <span style="flex:1"></span>
            <button class="btn" id="btn-refresh" style="flex:none;padding:4px 8px;font-size:10px;">刷新</button>
        </div>
        <div id="workspace-name" class="workspace-name" style="margin-bottom:4px;"></div>
        <div id="instance-list" style="margin-top:4px;"></div>
    </div>

    <!-- 项目快捷方式（上移，始终可见）-->
    <div class="card">
        <div class="card-title">&#x1F4C1; 项目快捷方式</div>
        <div style="display:flex;gap:6px;">
            <input type="text" id="path-input" placeholder="D:\\桌面\\project" style="flex:1;" />
            <button class="btn-small" id="add-path-btn">添加</button>
        </div>
        <div id="project-list" style="margin-top:4px;"></div>
    </div>

    <!-- 一键复制提示词 -->
    <button class="btn green" id="btn-copy-prompt" style="width:100%;margin-bottom:8px;padding:10px;font-size:13px;">&#x1F4CB; 一键复制 AI 提示词（首次对话必用）</button>

    <!-- 开关 -->
    <div class="card">
        <div class="toggle-row">
            <span class="toggle-label">&#x1F50C; 插件总开关</span>
            <label class="toggle-switch"><input type="checkbox" id="extension-toggle" checked /><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">&#x1F680; 发送后跳转 VS Code</span>
            <label class="toggle-switch"><input type="checkbox" id="auto-jump-toggle" checked /><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">&#x1F50D; 自动检测代码块</span>
            <label class="toggle-switch"><input type="checkbox" id="auto-scan-toggle" checked /><span class="toggle-slider"></span></label>
        </div>
    </div>

    <!-- 核心按钮（含新增）-->
    <div class="btn-row">
        <button class="btn primary" id="btn-scan">&#x1F50D; 扫描页面</button>
        <button class="btn primary" id="btn-context">&#x1F9E0; 上下文收集</button>
    </div>
    <div class="btn-row">
        <button class="btn" id="btn-send-dir">&#x1F4C1; 发送目录</button>
        <button class="btn" id="btn-copy-reply">&#x1F4CB; 复制AI回复</button>
        <button class="btn danger" id="btn-undo">&#x23EA; 撤销修改</button>
    </div>

    <!-- 最近操作 -->
    <div class="card">
        <div class="card-title">最近操作</div>
        <div id="recent-list"><div style="color:#6c7086;font-size:11px;">暂无记录</div></div>
    </div>

    <!-- 快捷发送 -->
    <div class="card">
        <div class="card-title">快捷发送代码到 VS Code</div>
        <textarea id="manual-text" placeholder="粘贴 agent-action 代码块或任意代码..."></textarea>
        <button class="btn primary" id="manual-send-btn" style="width:100%;margin-top:6px;">&#x1F4E4; 发送</button>
    </div>

    <div class="divider"></div>

    <!-- 导出（折叠）-->
    <div class="collapse-header" data-target="export-section">
        <span class="collapse-title">&#x1F4E6; 导出项目代码为 Word</span>
        <span class="collapse-arrow">&#x25B6;</span>
    </div>
    <div class="collapse-body" id="export-section">
        <div class="card">
            <label style="font-size:11px;color:#6c7086;">排除（每行一个）：</label>
            <textarea id="export-excludes" style="height:50px;margin:4px 0;" placeholder="*.md&#10;dist/&#10;*.docx"></textarea>
            <button class="btn warn" id="btn-export" style="width:100%;">&#x1F4E6; 一键导出</button>
        </div>
    </div>

    <!-- 工具（折叠）-->
    <div class="collapse-header" data-target="tools-section">
        <span class="collapse-title">&#x1F527; 工具</span>
        <span class="collapse-arrow">&#x25B6;</span>
    </div>
    <div class="collapse-body" id="tools-section">
        <div class="btn-row">
            <button class="btn" id="btn-restart">重启服务器</button>
            <button class="btn" id="btn-open-log">查看日志</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-reload-page">刷新页面</button>
            <button class="btn" id="btn-reload-ext">重载插件</button>
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-debug-info">调试信息</button>
            <button class="btn" id="btn-clear-history">清空历史</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
