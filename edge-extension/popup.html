<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 400px;
            max-height: 580px;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 13px;
        }

        /* ===== 顶部状态栏（固定） ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #181825;
            border-bottom: 1px solid #313244;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar-title {
            font-size: 14px;
            font-weight: 700;
            color: #89b4fa;
        }
        .top-bar-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #6c7086;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot-green { background: #a6e3a1; box-shadow: 0 0 4px #a6e3a1; }
        .dot-red { background: #f38ba8; box-shadow: 0 0 4px #f38ba8; }
        .top-bar-actions {
            display: flex;
            gap: 4px;
        }
        .icon-btn {
            width: 28px; height: 28px;
            border: none; border-radius: 6px;
            background: transparent;
            color: #6c7086;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .icon-btn:hover { background: #313244; color: #cdd6f4; }
        .icon-btn.active { color: #a6e3a1; }

        /* ===== 主体内容 ===== */
        .content { padding: 10px 14px; }

        /* ===== 快捷操作卡片 ===== */
        .quick-card {
            background: #313244;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .quick-card-title {
            font-size: 11px;
            color: #6c7086;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        /* ===== 工作区选择器 ===== */
        .workspace-selector {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .ws-chip {
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #45475a;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 11px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.15s;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .ws-chip:hover { border-color: #89b4fa; }
        .ws-chip.active {
            border-color: #89b4fa;
            background: rgba(137, 180, 250, 0.15);
            color: #89b4fa;
        }

        /* ===== 快捷按钮网格 ===== */
        .btn-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .action-btn {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 8px;
            background: #45475a;
            color: #cdd6f4;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            line-height: 1.3;
        }
        .action-btn:hover { background: #585b70; }
        .action-btn.primary { background: #89b4fa; color: #1e1e2e; font-weight: 600; }
        .action-btn.primary:hover { background: #74c7ec; }
        .action-btn.danger:hover { background: #45273a; color: #f38ba8; }
        .action-btn.warn { background: #fab387; color: #1e1e2e; font-weight: 600; }
        .action-btn.warn:hover { background: #f9c87c; }

        /* ===== 最近操作 ===== */
        .recent-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 11px;
        }
        .recent-icon { flex-shrink: 0; }
        .recent-file {
            flex: 1;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .recent-time {
            color: #6c7086;
            font-size: 10px;
            flex-shrink: 0;
        }

        /* ===== 折叠区 ===== */
        .collapse-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
        }
        .collapse-header:hover .collapse-title { color: #89b4fa; }
        .collapse-title {
            font-size: 12px;
            color: #6c7086;
            transition: color 0.15s;
        }
        .collapse-arrow {
            color: #6c7086;
            font-size: 10px;
            transition: transform 0.2s;
        }
        .collapse-arrow.open { transform: rotate(90deg); }
        .collapse-body {
            display: none;
            padding-bottom: 8px;
        }
        .collapse-body.open { display: block; }

        /* ===== 开关 ===== */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .toggle-label { font-size: 12px; }
        .toggle-switch { position: relative; width: 36px; height: 18px; flex-shrink: 0; }
        .toggle-switch input { display: none; }
        .toggle-slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #45475a; border-radius: 18px; cursor: pointer; transition: 0.2s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; width: 14px; height: 14px;
            left: 2px; top: 2px; background: white; border-radius: 50%; transition: 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #89b4fa; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

        /* ===== 输入 ===== */
        input[type="text"], textarea {
            width: 100%; padding: 7px 9px;
            border: 1px solid #45475a; border-radius: 6px;
            background: #1e1e2e; color: #cdd6f4;
            font-size: 12px; outline: none;
        }
        input:focus, textarea:focus { border-color: #89b4fa; }
        textarea {
            height: 70px; resize: vertical;
            font-family: "Cascadia Code", monospace; font-size: 11px;
        }
        .btn-small {
            padding: 6px 10px; border: none; border-radius: 6px;
            background: #89b4fa; color: #1e1e2e; font-size: 11px;
            font-weight: 600; cursor: pointer;
        }
        .btn-small:hover { background: #74c7ec; }

        /* ===== 路径管理 ===== */
        .path-item {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 6px; background: #1e1e2e; border-radius: 4px;
            font-size: 11px; margin-top: 3px;
        }
        .path-name {
            flex: 1; font-family: monospace;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            cursor: pointer;
        }
        .path-name:hover { color: #89b4fa; }
        .path-del {
            color: #6c7086; cursor: pointer; font-size: 13px; padding: 0 2px;
        }
        .path-del:hover { color: #f38ba8; }
        .path-open-badge {
            font-size: 9px; color: #a6e3a1; background: rgba(166,227,161,0.1);
            padding: 1px 5px; border-radius: 8px; flex-shrink: 0;
        }

        /* ===== 结果提示 ===== */
        .result {
            padding: 6px 10px; border-radius: 6px; font-size: 11px;
            display: none; margin-top: 6px;
        }
        .result-success { background: #1a3a1a; color: #a6e3a1; border: 1px solid #2e7d32; display: block; }
        .result-error { background: #3a1a1a; color: #f38ba8; border: 1px solid #d32f2f; display: block; }

        /* ===== 导出区 ===== */
        .export-excludes {
            height: 50px; margin-top: 4px; margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部状态栏 ===== -->
    <div class="top-bar">
        <div class="top-bar-left">
            <span class="top-bar-title">&#x26A1; AI Agent</span>
            <div class="top-bar-status">
                <span id="status-dot" class="dot dot-red"></span>
                <span id="status-label">检查中</span>
            </div>
        </div>
        <div class="top-bar-actions">
            <button class="icon-btn" id="btn-refresh" title="刷新连接">&#x1F504;</button>
            <button class="icon-btn" id="btn-copy-prompt" title="复制AI提示词">&#x1F4CB;</button>
            <button class="icon-btn" id="extension-toggle-btn" title="插件开关">&#x1F50C;</button>
        </div>
    </div>

    <div class="content" id="main-content">

        <!-- ===== 工作区选择器 ===== -->
        <div class="quick-card" id="workspace-card">
            <div class="quick-card-title">当前目标</div>
            <div id="workspace-info" style="font-family:monospace;font-size:12px;margin-bottom:6px;color:#89b4fa;"></div>
            <div class="workspace-selector" id="instance-list"></div>
        </div>

        <!-- ===== 核心操作 ===== -->
        <div class="btn-row">
            <button class="action-btn primary" id="btn-scan">&#x1F50D; 扫描页面</button>
            <button class="action-btn" id="btn-copy-reply">&#x1F4CB; 复制AI回复</button>
            <button class="action-btn danger" id="btn-undo">&#x23EA; 撤销修改</button>
        </div>

        <!-- ===== 最近操作 ===== -->
        <div class="quick-card">
            <div class="quick-card-title">最近操作</div>
            <div id="recent-list">
                <div style="color:#6c7086;font-size:11px;">暂无记录</div>
            </div>
        </div>

        <!-- ===== 手动发送 ===== -->
        <div class="quick-card">
            <div class="quick-card-title">快捷发送</div>
            <textarea id="manual-text" placeholder="粘贴 agent-action 代码块或任意代码..."></textarea>
            <div style="display:flex;gap:6px;margin-top:6px;">
                <button class="action-btn primary" id="manual-send-btn" style="flex:1;">&#x1F4E4; 发送到 VS Code</button>
            </div>
        </div>

        <!-- ===== 导出项目 ===== -->
        <div class="collapse-header" data-target="export-section">
            <span class="collapse-title">&#x1F4E6; 导出项目代码为 Word</span>
            <span class="collapse-arrow">&#x25B6;</span>
        </div>
        <div class="collapse-body" id="export-section">
            <div class="quick-card">
                <label style="font-size:11px;color:#6c7086;">排除文件/目录（每行一个）：</label>
                <textarea class="export-excludes" id="export-excludes" placeholder="*.md&#10;dist/&#10;*.docx"></textarea>
                <button class="action-btn warn" id="btn-export" style="width:100%;">&#x1F4E6; 一键导出</button>
            </div>
        </div>

        <!-- ===== 设置 ===== -->
        <div class="collapse-header" data-target="settings-section">
            <span class="collapse-title">&#x2699;&#xFE0F; 设置</span>
            <span class="collapse-arrow">&#x25B6;</span>
        </div>
        <div class="collapse-body" id="settings-section">
            <div class="quick-card">
                <div class="toggle-row">
                    <span class="toggle-label">&#x1F680; 发送后自动跳转 VS Code</span>
                    <label class="toggle-switch"><input type="checkbox" id="auto-jump-toggle" checked /><span class="toggle-slider"></span></label>
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">&#x1F50D; 自动检测页面代码块</span>
                    <label class="toggle-switch"><input type="checkbox" id="auto-scan-toggle" checked /><span class="toggle-slider"></span></label>
                </div>
            </div>
        </div>

        <!-- ===== 项目路径 ===== -->
        <div class="collapse-header" data-target="paths-section">
            <span class="collapse-title">&#x1F4C1; 项目快捷方式</span>
            <span class="collapse-arrow">&#x25B6;</span>
        </div>
        <div class="collapse-body" id="paths-section">
            <div class="quick-card">
                <div style="display:flex;gap:6px;">
                    <input type="text" id="path-input" placeholder="D:\\桌面\\project" style="flex:1;" />
                    <button class="btn-small" id="add-path-btn">添加</button>
                </div>
                <div id="project-list" style="margin-top:4px;"></div>
            </div>
        </div>

        <!-- ===== 工具 ===== -->
        <div class="collapse-header" data-target="tools-section">
            <span class="collapse-title">&#x1F527; 工具</span>
            <span class="collapse-arrow">&#x25B6;</span>
        </div>
        <div class="collapse-body" id="tools-section">
            <div class="btn-row">
                <button class="action-btn" id="btn-restart">&#x1F504; 重启服务器</button>
                <button class="action-btn" id="btn-open-log">&#x1F4DC; 查看日志</button>
            </div>
            <div class="btn-row">
                <button class="action-btn" id="btn-reload-page">&#x1F503; 刷新页面</button>
                <button class="action-btn" id="btn-reload-ext">&#x267B;&#xFE0F; 重载插件</button>
            </div>
            <div class="btn-row">
                <button class="action-btn" id="btn-debug-info">&#x1F50D; 调试信息</button>
                <button class="action-btn" id="btn-clear-history">&#x1F5D1; 清空历史</button>
            </div>
        </div>

    </div>

    <div id="result" class="result" style="margin:0 14px 10px;"></div>
    <script src="popup.js"></script>
</body>
</html>
